<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Parkar & Associates | Smart Residential Questionnaire</title>
  <style>
    :root{--base:#fff;--soft:#FAF8F5;--border:#E7E1D8;--text:#1E2630;--muted:#57616B;--accent:#B56C3E;--accent-soft:#F6E7DD;--accent-deep:#8E5230;--shadow:0 18px 45px rgba(30,38,48,.08)}
    *{box-sizing:border-box}body{margin:0;background:var(--soft);color:var(--text);font:16px/1.55 Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,textarea,select{font:inherit}button{cursor:pointer}.app{min-height:100vh;display:grid;grid-template-columns:300px 1fr}.sidebar{position:sticky;top:0;height:100vh;background:#fff;border-right:1px solid var(--border);padding:28px 22px;overflow:auto}.brand{display:flex;gap:12px;align-items:center;margin-bottom:24px}.logo{width:48px;height:48px;object-fit:contain;border-radius:12px;background:var(--soft)}.brand h1{font-size:17px;line-height:1.2;margin:0}.brand p{margin:3px 0 0;color:var(--muted);font-size:12px}.progress-card{background:var(--soft);border:1px solid var(--border);border-radius:20px;padding:16px;margin-bottom:20px}.progress-row{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:13px}.progress-track{height:9px;border-radius:999px;background:#e9e1d8;overflow:hidden;margin-top:10px}.progress-fill{height:100%;background:var(--accent);width:0%;transition:.2s}.nav{display:grid;gap:8px}.nav button{border:1px solid transparent;background:transparent;text-align:left;border-radius:16px;padding:11px 12px;color:var(--muted)}.nav button.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-deep)}.nav .num{font-size:11px;font-weight:700;margin-right:8px}.main{padding:32px;max-width:1180px;width:100%;margin:0 auto}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:18px}.pill{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:999px;padding:8px 12px;color:var(--muted);font-size:13px}.hero{position:relative;overflow:hidden;background:#fff;border:1px solid var(--border);border-radius:30px;box-shadow:var(--shadow);margin-bottom:22px}.hero img{width:100%;height:220px;object-fit:cover;display:block;background:linear-gradient(120deg,var(--accent-soft),#fff)}.hero img.hidden{display:none}.hero-body{padding:26px 28px;background:linear-gradient(180deg,rgba(255,255,255,.94),#fff)}.hero h2{font-size:38px;line-height:1.05;letter-spacing:-.04em;margin:0 0 10px}.hero p{color:var(--muted);max-width:780px;margin:0}.tabs{display:flex;gap:10px;overflow:auto;padding:2px 0 16px}.tabs button{white-space:nowrap;border:1px solid var(--border);background:#fff;color:var(--muted);border-radius:999px;padding:9px 13px}.tabs button.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-deep)}.question-card{background:#fff;border:1px solid var(--border);border-radius:24px;padding:22px;margin-bottom:15px;box-shadow:0 10px 28px rgba(30,38,48,.035)}.question-head{display:flex;gap:12px;align-items:flex-start;justify-content:space-between}.qcode{color:var(--accent-deep);font-weight:750;font-size:13px}.label{font-size:18px;font-weight:720;margin:4px 0}.required{color:#C56C4B}.helper{color:var(--muted);font-size:14px;margin:0 0 14px}.options{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}.option{border:1px solid var(--border);background:#fff;border-radius:16px;padding:13px 14px;text-align:left;color:var(--text)}.option.selected{border-color:var(--accent);background:var(--accent-soft);box-shadow:inset 0 0 0 1px var(--accent)}.field{width:100%;border:1px solid var(--border);background:#fff;border-radius:15px;padding:13px 14px;outline:none}.field:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}textarea.field{min-height:120px;resize:vertical}.actions{position:sticky;bottom:0;background:linear-gradient(180deg,rgba(250,248,245,0),var(--soft) 26%);padding:28px 0 0;display:flex;justify-content:space-between;gap:12px}.btn{border:1px solid var(--border);border-radius:999px;padding:12px 18px;background:#fff;color:var(--text);font-weight:700}.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.btn:disabled{opacity:.45;cursor:not-allowed}.review{background:#fff;border:1px solid var(--border);border-radius:28px;padding:28px;box-shadow:var(--shadow)}.review pre{white-space:pre-wrap;background:var(--soft);border:1px solid var(--border);border-radius:18px;padding:16px;max-height:440px;overflow:auto}.notice{border:1px solid var(--border);border-radius:18px;background:var(--accent-soft);padding:14px 16px;color:var(--accent-deep);margin-bottom:14px}.error{background:#fff1f1;border-color:#f0c7c7;color:#842424}.success{background:#eef8ef;border-color:#c6e8c8;color:#255d2b}.mobile-nav{display:none}@media(max-width:860px){.app{display:block}.sidebar{display:none}.mobile-nav{display:block;margin-bottom:14px}.main{padding:18px}.hero h2{font-size:30px}.hero img{height:160px}.actions{padding-bottom:8px}.options{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><img class="logo" src="assets/parkar-logo.png" onerror="this.style.display='none'" alt="Parkar & Associates logo"><div><h1>Parkar & Associates</h1><p>Residential Project Decision Sheet</p></div></div>
      <div class="progress-card"><div class="progress-row"><span>Overall progress</span><strong id="progressText">0%</strong></div><div class="progress-track"><div id="progressFill" class="progress-fill"></div></div><div class="progress-row" style="margin-top:8px"><span id="progressCount">0 of 0 answered</span></div></div>
      <nav id="sideNav" class="nav"></nav>
    </aside>
    <main class="main">
      <select id="mobileNav" class="field mobile-nav" aria-label="Choose section"></select>
      <div class="topbar"><span class="pill">Premium guided residential onboarding</span><span class="pill" id="modePill">Tailored mode</span></div>
      <section id="view"></section>
    </main>
  </div>
<script type="module">
import { SECTIONS } from './sections-data.js';
import { QUESTIONS } from './questions-data.js';
import { getVisibleQuestions, calculateProgress, deriveRoutingAnswers, isAnswered } from './filtering-rules.js';
import { buildSubmissionPayload, buildFullResponseText, submitToFormkeep, FORMKEEP_ENDPOINT, generateReferenceId } from './output-mapping.js';

const state = {
  answers: JSON.parse(localStorage.getItem('parkar_answers') || '{}'),
  sectionIndex: 0,
  activeSubcategory: null,
  submitting: false,
  submitted: false,
  submitError: ''
};
const view = document.getElementById('view');
const sideNav = document.getElementById('sideNav');
const mobileNav = document.getElementById('mobileNav');

function save(){ localStorage.setItem('parkar_answers', JSON.stringify(state.answers)); }
function sectionQuestions(section){ return getVisibleQuestions(QUESTIONS, state.answers).filter(q => q.sectionId === section.sectionId); }
function setTheme(section){ document.documentElement.style.setProperty('--accent', section.accentPrimary); document.documentElement.style.setProperty('--accent-soft', section.accentSoft); document.documentElement.style.setProperty('--accent-deep', section.accentDeep); }
function optionLabel(question, value){ return question.options?.find(o => o.value === value)?.label || value; }
function displayValue(question, value){ return Array.isArray(value) ? value.map(v => optionLabel(question, v)).join('; ') : optionLabel(question, value); }
function updateDerived(){ const routed = deriveRoutingAnswers(state.answers); state.answers.projectType = routed.projectType; state.answers.serviceScopes = routed.serviceScopes; state.answers.tailorMode = routed.tailorMode; document.getElementById('modePill').textContent = routed.tailorMode === 'full_residential' ? 'Full residential mode' : 'Tailored mode'; }
function updateProgress(){ updateDerived(); const p = calculateProgress(QUESTIONS, state.answers); document.getElementById('progressText').textContent = `${p.percent}%`; document.getElementById('progressFill').style.width = `${p.percent}%`; document.getElementById('progressCount').textContent = `${p.answered} of ${p.visible} visible questions answered`; }
function renderNav(){ sideNav.innerHTML = ''; mobileNav.innerHTML = ''; SECTIONS.forEach((s,i)=>{ const count = sectionQuestions(s).length; const b=document.createElement('button'); b.className=i===state.sectionIndex?'active':''; b.innerHTML=`<span class="num">${s.sectionNumber}</span>${s.shortTitle || s.title} <small>(${count})</small>`; b.onclick=()=>{state.sectionIndex=i; state.activeSubcategory=null; render();}; sideNav.appendChild(b); const opt=document.createElement('option'); opt.value=i; opt.textContent=`${s.sectionNumber} ${s.title}`; opt.selected=i===state.sectionIndex; mobileNav.appendChild(opt); }); mobileNav.onchange=e=>{state.sectionIndex=Number(e.target.value); state.activeSubcategory=null; render();}; }
function setAnswer(id, value){ state.answers[id]=value; if(id==='q01_1') state.answers.projectType=value; if(id==='q01_2') state.answers.serviceScopes=value; if(id==='q01_4') state.answers.tailorMode=value; updateDerived(); save(); render(); }
function renderInput(q){ const value = state.answers[q.id] ?? (q.type === 'multi_select' || q.type === 'rank' ? [] : ''); if(q.type==='single_select' || q.type==='yes_no'){ const opts = q.type==='yes_no' && (!q.options || !q.options.length) ? [{label:'Yes',value:'yes'},{label:'No',value:'no'}] : q.options; return `<div class="options">${opts.map(o=>`<button type="button" class="option ${value===o.value?'selected':''}" data-q="${q.id}" data-v="${o.value}">${o.label}</button>`).join('')}</div>`; }
  if(q.type==='multi_select' || q.type==='rank'){ return `<div class="options">${(q.options||[]).map(o=>`<button type="button" class="option ${Array.isArray(value)&&value.includes(o.value)?'selected':''}" data-q="${q.id}" data-v="${o.value}" data-multi="1">${o.label}</button>`).join('')}</div>`; }
  if(q.type==='long_text') return `<textarea class="field" data-q="${q.id}" placeholder="Type here...">${escapeHtml(value)}</textarea>`;
  const inputType = q.type==='email'?'email':q.type==='phone'?'tel':q.type==='number'?'number':q.type==='date'?'date':q.type==='link'?'url':'text';
  return `<input class="field" data-q="${q.id}" type="${inputType}" value="${escapeHtml(value)}" placeholder="Type here...">`;
}
function escapeHtml(v){ return String(v ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function attachHandlers(){ view.querySelectorAll('.option').forEach(btn=>{ btn.onclick=()=>{ const id=btn.dataset.q, v=btn.dataset.v; if(btn.dataset.multi){ const arr=Array.isArray(state.answers[id])?[...state.answers[id]]:[]; const next=arr.includes(v)?arr.filter(x=>x!==v):[...arr,v]; setAnswer(id,next); } else setAnswer(id,v); }; }); view.querySelectorAll('input.field, textarea.field').forEach(el=>{ el.oninput=()=>{ state.answers[el.dataset.q]=el.value; updateDerived(); save(); updateProgress(); }; }); }
function missingRequired(){ return getVisibleQuestions(QUESTIONS, state.answers).filter(q => q.required && !isAnswered(q, state.answers)); }
function renderSection(){ updateDerived(); const section=SECTIONS[state.sectionIndex]; setTheme(section); const qs = sectionQuestions(section); const subcats = section.subcategories || []; if(!state.activeSubcategory && subcats[0]) state.activeSubcategory = subcats.find(sc=>qs.some(q=>q.subcategoryId===sc.id))?.id || subcats[0].id; const shown = qs.filter(q => !state.activeSubcategory || q.subcategoryId === state.activeSubcategory); view.innerHTML = `<div class="hero"><img src="${section.heroImage}" alt="${section.title}" onerror="this.classList.add('hidden')"><div class="hero-body"><div class="qcode">SECTION ${section.sectionNumber}</div><h2>${section.title}</h2><p>${section.intro || ''}</p></div></div><div class="tabs">${subcats.map(sc=>`<button class="${state.activeSubcategory===sc.id?'active':''}" data-sub="${sc.id}">${sc.title}</button>`).join('')}</div>${shown.length?shown.map(q=>`<article class="question-card"><div class="question-head"><div><div class="qcode">${q.questionCode || q.id}</div><div class="label">${q.label} ${q.required?'<span class="required">*</span>':''}</div>${q.helper?`<p class="helper">${q.helper}</p>`:''}</div></div>${renderInput(q)}${q.architectCanRecommend?'<p class="helper" style="margin-top:12px">You may select “Architect can recommend” wherever you are unsure.</p>':''}</article>`).join(''):'<div class="notice">No questions are visible in this group for the selected project path.</div>'}<div class="actions"><button class="btn" id="prevBtn">Back</button><button class="btn primary" id="nextBtn">${state.sectionIndex===SECTIONS.length-1?'Review & Submit':'Next section'}</button></div>`; view.querySelectorAll('[data-sub]').forEach(b=>b.onclick=()=>{state.activeSubcategory=b.dataset.sub; renderSection();}); document.getElementById('prevBtn').onclick=()=>{ if(state.sectionIndex>0){state.sectionIndex--; state.activeSubcategory=null; render();} }; document.getElementById('nextBtn').onclick=()=>{ if(state.sectionIndex<SECTIONS.length-1){state.sectionIndex++; state.activeSubcategory=null; render();} else renderReview(); }; attachHandlers(); }
function renderReview(){ setTheme(SECTIONS[SECTIONS.length-1]); updateProgress(); if(!state.answers.__referenceId){ state.answers.__referenceId = generateReferenceId(); save(); } const visibleQuestions = getVisibleQuestions(QUESTIONS, state.answers); const missing = missingRequired(); const text = buildFullResponseText({ answers: state.answers, questions: visibleQuestions, sections: SECTIONS }); view.innerHTML = `<div class="review"><div class="qcode">REVIEW & SUBMIT</div><h2 style="margin:4px 0 8px">Confirm your residential brief</h2><p class="helper">Review the captured response, copy it as a backup if needed, then submit to Parkar & Associates.</p>${state.submitted?'<div class="notice success">Thank you. Your project decision sheet has been submitted successfully.</div>':''}${state.submitError?`<div class="notice error">${state.submitError}</div>`:''}${missing.length?`<div class="notice error"><strong>${missing.length} required question(s) still need answers.</strong><br>${missing.slice(0,8).map(q=>`${q.questionCode}: ${q.label}`).join('<br>')}${missing.length>8?'<br>…':''}</div>`:'<div class="notice">All visible required questions are complete.</div>'}<pre id="fullResponse">${escapeHtml(text)}</pre><div class="actions"><button class="btn" id="backToForm">Back to form</button><div><button class="btn" id="copyBtn">Copy Full Response</button> <button class="btn primary" id="submitBtn" ${missing.length||state.submitting||state.submitted?'disabled':''}>${state.submitting?'Submitting...':'Submit to Parkar & Associates'}</button></div></div><form id="fallbackForm" action="${FORMKEEP_ENDPOINT}" method="POST" accept-charset="UTF-8" style="display:none"><input type="hidden" name="utf8" value="✓"></form></div>`; document.getElementById('backToForm').onclick=()=>renderSection(); document.getElementById('copyBtn').onclick=async()=>{ await navigator.clipboard.writeText(text); document.getElementById('copyBtn').textContent='Copied'; }; document.getElementById('submitBtn')?.addEventListener('click', submit); }
async function submit(){ state.submitting=true; state.submitError=''; renderReview(); try{ const visibleQuestions = getVisibleQuestions(QUESTIONS, state.answers); const payload=buildSubmissionPayload({answers:state.answers,questions:visibleQuestions,sections:SECTIONS}); await submitToFormkeep(payload); state.submitted=true; localStorage.removeItem('parkar_answers'); }catch(err){ console.error(err); state.submitError='Submission could not be completed. Please use “Copy Full Response” and email it to Info@parkar.associates as a backup.'; } finally{ state.submitting=false; renderReview(); } }
function render(){ updateProgress(); renderNav(); renderSection(); }
render();
</script>
</body>
</html>
